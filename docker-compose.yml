services:
  artifex:
    build: .
    container_name: artifex
    ports:
      - "3080:3002"
    volumes:
      - artifex-uploads:/app/uploads
      - artifex-data:/app/data
      - artifex-models:/app/models
    environment:
      - NODE_ENV=production
      - PORT=3002
      - JWT_SECRET=${JWT_SECRET:-}
      - INSTANCE_NAME=${INSTANCE_NAME:-Artifex Gallery}
      - PUBLIC_URL=${PUBLIC_URL:-}
      - FEDERATION_ENABLED=${FEDERATION_ENABLED:-true}
      - DEFAULT_STORAGE_QUOTA=${DEFAULT_STORAGE_QUOTA:-5368709120}
      - ARTIFEX_DB_PATH=/app/data/gallery.db
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-}
      - LOG_LEVEL=${LOG_LEVEL:-info}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "const http=require('http'); http.get('http://localhost:3002/api/health', r => { process.exit(r.statusCode===200?0:1) }).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  artifex-uploads:
  artifex-data:
  artifex-models:
